# PHASE 11 ONLY — copy to .github/workflows/deploy-ai-service.yml when ready to deploy.
# Not active during local development (Phases 0–10).

name: Deploy AI Service

on:
  push:
    branches: [main]
    paths:
      - "services/ai-service/**"
      - ".github/workflows/deploy-ai-service.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/botuncle-ai-service
  GCP_REGION: us-central1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/ai-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy botuncle-ai-service \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --project "${{ secrets.GCP_PROJECT_ID }}"
